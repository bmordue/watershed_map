# SonarCloud configuration for watershed_map project
# Organization and project keys should be configured in SonarCloud UI

sonar.projectKey=bmordue_watershed_map
sonar.organization=bmordue

# Project metadata
sonar.projectName=Watershed Mapping with FOSS GIS Stack
sonar.projectVersion=1.0

# Source code directories
sonar.sources=scripts,lib,config
sonar.tests=

# Exclude directories from analysis
sonar.exclusions=**/grassdb/**,**/data/**,**/output/**,**/__pycache__/**,**/*.pyc,**/.venv/**,**/venv/**

# Language-specific settings
# Python
sonar.python.version=3.8,3.9,3.10,3.11,3.12

# Shell scripts
sonar.lang.patterns.sh=**/*.sh

# Coverage settings (currently no coverage reports)
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.coverage.exclusions=

# SCM settings
sonar.scm.provider=git

# Additional settings
sonar.sourceEncoding=UTF-8
